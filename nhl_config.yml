# ============================================================
#  NHL Goal Scorer Predictor — Configuration
# ============================================================

prediction:
  date: "today"
  min_games_played: 10
  min_toi_per_game: 8
  positions: ["C", "L", "R"]

  # Top N players shown in each section independently
  top_n_goals:  15
  top_n_points: 15
  top_n_shots:  15

  # Shots: line for P(over X.5 shots) — matches common sportsbook line
  shots_line: 2.5

model:
  recent_form_games: 10
  avg_toi_per_game: 15.5

  # League averages (2022-25 NHL forwards)
  lg_avg_goals_per_60:  0.65
  lg_avg_points_per_60: 1.70
  lg_avg_shots_per_60:  8.50
  lg_avg_save_pct:      0.906

email:
  subject: "🏒 NHL Predictions — {date}"
  from_name: "NHL Predictor"
