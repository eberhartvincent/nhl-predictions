# .github/workflows/nhl_retrain.yml
# =====================================================================
#  NHL Goal Predictor — Annual Model Retraining
# =====================================================================
#
#  Runs once per year on May 1st — after the regular season ends
#  (playoffs run April-June but regular season data is complete).
#
#  Data: Moneypuck free CSV downloads (no API key needed)
#  Training: Year-N → Year-(N+1) goals/60 (no look-ahead bias)
#  Output: models/nhl_model.json + models/nhl_feature_metadata.json
#          committed back to the repo
#
# =====================================================================

name: 🔁 Retrain NHL Model

on:
  schedule:
    - cron: "0 10 1 5 *"   # May 1st each year at 6 AM ET

  workflow_dispatch:
    inputs:
      years:
        description: "Training years (comma-separated)"
        required: false
        default: "2021,2022,2023,2024"
        type: string
      dry_run:
        description: "Train but don't commit"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  retrain:
    name: Train XGBoost NHL Goal Model
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: |
          YEARS="${{ github.event.inputs.years || '2021,2022,2023,2024' }}"
          python - << EOF
          import logging, sys
          logging.basicConfig(level=logging.INFO,
              format="%(asctime)s  %(levelname)-8s  %(name)s — %(message)s",
              datefmt="%H:%M:%S")
          from src.models.nhl_train import train
          years = [int(y.strip()) for y in "${YEARS}".split(",")]
          try:
              meta = train(years=years)
              print(f"::notice::NHL training complete — CV R²={meta['cv_r2']:.4f}, MAE={meta['cv_mae']:.4f}, n={meta['n_training']}")
          except Exception as e:
              print(f"::error::NHL training failed: {e}")
              sys.exit(1)
          EOF

      - name: Show model metrics
        run: |
          python - << 'EOF'
          import json
          from pathlib import Path
          meta = json.loads(Path("models/nhl_feature_metadata.json").read_text())
          print("=" * 50)
          print("NHL MODEL SUMMARY")
          print("=" * 50)
          print(f"Training years : {meta['training_years']}")
          print(f"Training n     : {meta['n_training']}")
          print(f"CV R²          : {meta['cv_r2']:.4f}")
          print(f"CV MAE         : {meta['cv_mae']:.4f} goals/60")
          print(f"LG avg g/60    : {meta['lg_goals_per_60']:.4f}")
          print("\nFeature Importance:")
          for feat, imp in meta['feature_importance'].items():
              bar = "█" * int(imp * 100)
              print(f"  {feat:20s} {imp:.4f}  {bar}")
          EOF

      - name: Commit model
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/nhl_model.json models/nhl_feature_metadata.json
          if git diff --staged --quiet; then
            echo "Model unchanged — nothing to commit."
          else
            METRICS=$(python -c "
          import json; from pathlib import Path
          m = json.loads(Path('models/nhl_feature_metadata.json').read_text())
          print(f\"R²={m['cv_r2']:.4f} MAE={m['cv_mae']:.4f} n={m['n_training']}\")
          ")
            git commit -m "chore: retrain NHL model [${METRICS}]"
            git push
            echo "✅ NHL model committed."
          fi

      - name: Upload artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: nhl-model-${{ github.run_id }}
          path: |
            models/nhl_model.json
            models/nhl_feature_metadata.json
          retention-days: 90
