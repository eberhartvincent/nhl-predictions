# .github/workflows/nhl_retrain.yml
# =====================================================================
#  NHL Goal Predictor — Annual Model Retraining (3 models)
# =====================================================================

name: 🔁 Retrain NHL Models

on:
  schedule:
    - cron: "0 10 1 5 *"   # May 1st each year at 6 AM ET

  workflow_dispatch:
    inputs:
      years:
        description: "Training years (comma-separated)"
        required: false
        default: "2021,2022,2023,2024"
        type: string
      dry_run:
        description: "Train but don't commit"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  retrain:
    name: Train XGBoost NHL Models (Goals · Points · Shots)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train all three models
        run: |
          YEARS="${{ github.event.inputs.years || '2021,2022,2023,2024' }}"
          python - << EOF
          import logging, sys
          logging.basicConfig(level=logging.INFO,
              format="%(asctime)s  %(levelname)-8s  %(name)s — %(message)s",
              datefmt="%H:%M:%S")
          from src.models.nhl_train import train
          years = [int(y.strip()) for y in "${YEARS}".split(",")]
          try:
              all_meta = train(years=years)
              for name, meta in all_meta.items():
                  print(f"::notice::{name}: CV R²={meta['cv_r2']:.4f}  MAE={meta['cv_mae']:.4f}  n={meta['n_training']}")
          except Exception as e:
              print(f"::error::NHL training failed: {e}")
              sys.exit(1)
          EOF

      - name: Show model metrics
        run: |
          python - << 'EOF'
          import json
          from pathlib import Path

          print("=" * 55)
          print("NHL MODEL SUMMARY")
          print("=" * 55)

          for name in ("goals", "points", "shots"):
              path = Path(f"models/nhl_{name}_metadata.json")
              if not path.exists():
                  print(f"{name}: metadata not found")
                  continue
              meta = json.loads(path.read_text())
              print(f"\n{name.upper()} MODEL")
              print(f"  Training years : {meta['training_years']}")
              print(f"  Samples        : {meta['n_training']}")
              print(f"  CV R²          : {meta['cv_r2']:.4f}")
              print(f"  CV MAE         : {meta['cv_mae']:.4f} {name}/60")
              print(f"  LG avg         : {meta['lg_avg']:.4f} {name}/60")
              print(f"  Top features:")
              for feat, imp in list(meta['feature_importance'].items())[:4]:
                  bar = "█" * int(imp * 80)
                  print(f"    {feat:25s} {imp:.4f}  {bar}")

          print("=" * 55)
          EOF

      - name: Commit models to repository
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            models/nhl_goals_model.json  models/nhl_goals_metadata.json \
            models/nhl_points_model.json models/nhl_points_metadata.json \
            models/nhl_shots_model.json  models/nhl_shots_metadata.json

          if git diff --staged --quiet; then
            echo "Models unchanged — nothing to commit."
          else
            SUMMARY=$(python - << 'EOF'
          import json
          from pathlib import Path
          parts = []
          for name in ("goals", "points", "shots"):
              p = Path(f"models/nhl_{name}_metadata.json")
              if p.exists():
                  m = json.loads(p.read_text())
                  parts.append(f"{name} R²={m['cv_r2']:.4f}")
          print(" | ".join(parts))
          EOF
          )
            git commit -m "chore: retrain NHL models [${SUMMARY}]

          Training years: ${{ github.event.inputs.years || '2021,2022,2023,2024' }}
          Run: ${{ github.run_id }}"
            git push
            echo "✅ All three NHL models committed."
          fi

      - name: Upload artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: nhl-models-${{ github.run_id }}
          path: |
            models/nhl_goals_model.json
            models/nhl_goals_metadata.json
            models/nhl_points_model.json
            models/nhl_points_metadata.json
            models/nhl_shots_model.json
            models/nhl_shots_metadata.json
          retention-days: 90
